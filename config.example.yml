domain:
  root: jsw.ac.cn
  wildcard: '*.jsw.ac.cn'

cert:
  key_type: ec-256
  renew_before_days: 30
  state_file: .state/certsync-state.json

cloudflare:
  enabled: true
  zone_id: ${CF_EDGE_ZONE_ID}
  bundle_method: ubiquitous
  certificate_type: sni_custom
  hosts:
    - jsw.ac.cn
    - '*.jsw.ac.cn'

aliyun:
  enabled: true
  # 名称固定，不再追加时间戳
  certificate_name: jsw-ac-cn-zerossl
  # 说明：上传 API 本身不显式带 cert_region，但国际站账号下游产品引用 CAS 证书时请使用 ap-southeast-1
  cert_region: ap-southeast-1
  endpoint: cas.aliyuncs.com
  delete_on_name_repeat: true
  deploy:
    enabled: false
    contact_ids: []
    schedule_time: ''
    resources: []

tencent:
  enabled: true
  # 别名固定，不再追加时间戳
  alias_name: jsw-ac-cn-zerossl
  project_id: 0
  delete_on_alias_conflict: true
  deploy:
    enabled: false
    resources: []

domain:
  root: jsw.ac.cn
  wildcard: '*.jsw.ac.cn'

cert:
  key_type: ec-256
  renew_before_days: 30
  state_file: .state/certsync-state.json

cloudflare:
  enabled: true
  zone_id: ${CF_EDGE_ZONE_ID}
  bundle_method: ubiquitous
  certificate_type: sni_custom
  hosts:
    - jsw.ac.cn
    - '*.jsw.ac.cn'

aliyun:
  enabled: true
  certificate_name_prefix: jsw-ac-cn-zerossl
  deploy:
    enabled: false
    contact_ids: []
    schedule_time: ''
    resources: []
    # - cloud_name: aliyun
    #   cloud_product: CDN
    #   resource_ids: ['1234567']
    # - cloud_name: aliyun
    #   cloud_product: ALB
    #   resource_ids: ['7654321']

tencent:
  enabled: true
  alias_prefix: jsw-ac-cn-zerossl
  project_id: 0
  deploy:
    enabled: false
    resources: []
